name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy_hostinger:
        description: "Deploy to the configured Hostinger VPS after image publish"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  publish-images:
    name: Build and publish container images
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for backend
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata for frontend
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/frontend
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend.Dockerfile
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Prepare deployment bundle
        run: |
          mkdir -p deploy-bundle
          cp deploy/hostinger/docker-compose.yml deploy-bundle/docker-compose.yml
          cp deploy/hostinger/deploy.sh deploy-bundle/deploy.sh
          cat > deploy-bundle/images.env <<EOF
          BACKEND_IMAGE=${{ env.IMAGE_PREFIX }}/backend:${{ github.event.workflow_run.head_sha || github.sha }}
          FRONTEND_IMAGE=${{ env.IMAGE_PREFIX }}/frontend:${{ github.event.workflow_run.head_sha || github.sha }}
          EOF

      - name: Upload deployment bundle
        uses: actions/upload-artifact@v4
        with:
          name: hostinger-deployment-bundle
          path: deploy-bundle/

  deploy-hostinger:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    needs: publish-images
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_hostinger == 'true'
    environment: production

    steps:
      - name: Download deployment bundle
        uses: actions/download-artifact@v4
        with:
          name: hostinger-deployment-bundle
          path: deploy-bundle

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
          ssh-keyscan -p "${{ secrets.HOSTINGER_PORT || '22' }}" "${{ secrets.HOSTINGER_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy deployment files
        run: |
          APP_DIR="${{ secrets.HOSTINGER_APP_DIR }}"
          ssh -i ~/.ssh/hostinger_key -p "${{ secrets.HOSTINGER_PORT || '22' }}" "${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}" "mkdir -p '$APP_DIR'"
          scp -i ~/.ssh/hostinger_key -P "${{ secrets.HOSTINGER_PORT || '22' }}" deploy-bundle/docker-compose.yml deploy-bundle/deploy.sh deploy-bundle/images.env "${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:$APP_DIR/"

      - name: Run remote deploy
        run: |
          APP_DIR="${{ secrets.HOSTINGER_APP_DIR }}"
          ssh -i ~/.ssh/hostinger_key -p "${{ secrets.HOSTINGER_PORT || '22' }}" "${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}" "\
            cd '$APP_DIR' && \
            chmod +x deploy.sh && \
            GHCR_USERNAME='${{ secrets.GHCR_USERNAME }}' GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}' ./deploy.sh"
